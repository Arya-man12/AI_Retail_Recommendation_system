services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_ORIGIN: http://localhost:5173
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      EMQX_HOST: emqx
      ENABLE_EMQX_SUBSCRIBER: "true"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      emqx:
        condition: service_started
    volumes:
      - backend_mlruns:/app/mlruns
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    profiles: ["local-databases"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    profiles: ["local-databases"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ChangeMe123!}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  emqx:
    image: emqx/emqx:5.8
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    restart: unless-stopped

volumes:
  backend_mlruns:
  redis_data:
  mongo_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  emqx_data:
  emqx_log:
